name: Build & Release

# Runs in the PUBLIC repo tokans/myHealth.
#
# Unlike myFinance (a private dev repo mirrored to a public one), myHealth is
# ALREADY public at tokans/myHealth — there is no private→public mirror step. A
# release tag (v*) pushed here directly triggers this workflow, which builds the
# desktop (Windows + macOS) and experimental mobile bundles, code-signs them,
# and publishes one GitHub Release + refreshes the README and the gh-pages
# landing site — all in this one public repo via the built-in GITHUB_TOKEN.
#
# Signing:
#   - Windows: SignPath Foundation (free OSS code-signing). The sign-windows job
#     passes the UNSIGNED bundles through unchanged until SIGNPATH_API_TOKEN +
#     the project slugs are configured, so releases keep working before SignPath
#     approval.
#   - macOS: the .dmg ships unsigned (right-click → Open once) until APPLE_*
#     secrets are wired up.
#
# sharedCoreLib (+ its scandoc-lib) is a PUBLIC sibling, checked out without a
# token. @mydemo/core is an OPTIONAL dep (demo rig only) and is intentionally
# NOT checked out.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        type: string

env:
  PUBLISH_REPO: tokans/myHealth

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Resolve the version string once so every job agrees on it.
  # ---------------------------------------------------------------------------
  version:
    if: github.repository == 'tokans/myHealth'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # 2. Build native bundles on each OS and upload them as workflow artifacts.
  #    Windows uploads an INTERMEDIATE artifact (staging-windows) that the
  #    sign-windows job signs and re-publishes as bundles-windows.
  # ---------------------------------------------------------------------------
  build:
    needs: version
    if: github.repository == 'tokans/myHealth'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: windows
            upload_name: staging-windows     # signed later → bundles-windows
          - platform: macos-latest           # Universal (Intel + Apple Silicon)
            artifact: macos-universal
            upload_name: bundles-macos-universal
            args: "--target universal-apple-darwin"
            rust-target: aarch64-apple-darwin,x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: myHealth
    steps:
      # The app consumes the PUBLIC sibling sharedCoreLib (+ scandoc-lib) via
      # file:../ paths. @mydemo/core is an OPTIONAL dep (demo rig only) and is
      # intentionally NOT checked out — plain `npm ci` skips a missing optional
      # file: dep. Do NOT add --omit=optional: it would also drop rolldown's
      # platform-native bundler binding (@rolldown/binding-*), which `vite build`
      # needs, breaking the build.
      - name: Check out myHealth (this public repo)
        uses: actions/checkout@v4
        with:
          path: myHealth
      - name: Check out sharedCoreLib (public, file:../sharedCoreLib + scandoc-lib)
        uses: actions/checkout@v4
        with:
          repository: tokans/sharedCoreLib
          ref: master
          path: sharedCoreLib

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "myHealth/src-tauri -> target"
          key: ${{ matrix.artifact }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myHealth/package-lock.json

      - name: Install sharedCoreLib deps (prebuild builds the lib from these)
        working-directory: sharedCoreLib
        run: npm ci
      - name: Install scandoc-lib deps (prebuild also builds @scandoc/core)
        working-directory: sharedCoreLib/scandoc-lib
        run: npm ci

      - name: Install npm dependencies
        # Plain `npm ci` skips the absent optional @mydemo/core sibling but keeps
        # rolldown's platform-native binding (do NOT use --omit=optional).
        run: npm ci

      # tauri-action runs `npm run build` (beforeBuildCommand) + `tauri build`,
      # then exposes the produced bundle paths as `artifactPaths`.
      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization is DISABLED — the .dmg ships unsigned.
          # We deliberately do NOT reference secrets.APPLE_* so no `security
          # import` is attempted (a malformed inherited secret would hard-fail
          # the required macOS build). To re-enable later, restore valid APPLE_*
          # secrets and uncomment the block below.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: myHealth
          args: ${{ matrix.args }}

      - name: Collect built bundles
        shell: bash
        run: |
          # Write to the workspace root: upload-artifact resolves `path` against
          # GITHUB_WORKSPACE, not this step's working-directory (myHealth).
          DEST="$GITHUB_WORKSPACE/dist-bundles"
          mkdir -p "$DEST"
          echo '${{ steps.tauri.outputs.artifactPaths }}' \
            | tr -d '[]"' | tr ',' '\n' | sed '/^$/d' \
            | while read -r f; do
                [ -f "$f" ] && cp "$f" "$DEST/" || echo "skip: $f"
              done
          ls -la "$DEST"

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload_name }}
          path: dist-bundles/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2d. Sign the Windows bundles via SignPath Foundation (free OSS signing).
  #     PASS-THROUGH until SIGNPATH_API_TOKEN + the project slugs below are
  #     filled in. Once SignPath approves the myHealth project:
  #       1. add the SIGNPATH_API_TOKEN secret,
  #       2. set organization-id / project-slug / signing-policy-slug /
  #          artifact-configuration-slug to your SignPath project values, and
  #       3. confirm the action input names against the version you pin.
  # ---------------------------------------------------------------------------
  sign-windows:
    needs: [version, build]
    if: github.repository == 'tokans/myHealth'
    runs-on: ubuntu-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - name: Download unsigned Windows bundles
        id: dl
        uses: actions/download-artifact@v4
        with:
          name: staging-windows
          path: windows

      - name: Submit to SignPath for signing
        id: signpath
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: REPLACE_WITH_SIGNPATH_ORGANIZATION_ID
          project-slug: myhealth
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installers
          github-artifact-id: ${{ steps.dl.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: windows-signed

      - name: Stage signed (or pass-through unsigned) bundles
        shell: bash
        run: |
          set -euo pipefail
          if [ -d windows-signed ] && [ -n "$(ls -A windows-signed 2>/dev/null || true)" ]; then
            echo "Publishing SignPath-SIGNED Windows bundles."
            SRC=windows-signed
          else
            echo "::warning::SignPath not configured — publishing UNSIGNED Windows bundles."
            SRC=windows
          fi
          mkdir -p out && cp -r "$SRC"/. out/
          ls -la out

      - name: Upload Windows bundles (final)
        uses: actions/upload-artifact@v4
        with:
          name: bundles-windows
          path: out/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2b. Android — debug-signed APK (installable now) + unsigned release AAB.
  #     EXPERIMENTAL / unsigned: `continue-on-error` so a mobile hiccup never
  #     blocks the desktop release. Only arm64-v8a is built (Stronghold's
  #     libsodium has no Android prebuilt; SODIUM_LIB_DIR points at one ABI dir).
  # ---------------------------------------------------------------------------
  build-android:
    needs: version
    if: github.repository == 'tokans/myHealth'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: myHealth
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false        # leave the Android SDK directory untouched
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check out myHealth (this public repo)
        uses: actions/checkout@v4
        with:
          path: myHealth
      - name: Check out sharedCoreLib (public, file:../sharedCoreLib + scandoc-lib)
        uses: actions/checkout@v4
        with:
          repository: tokans/sharedCoreLib
          ref: master
          path: sharedCoreLib

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Pin the NDK that compiles the app's Rust to r27c — the same version the
      # libsodium Docker image uses — so the toolchains agree.
      - name: Set up Android NDK (r27c)
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Export NDK env
        shell: bash
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Set up Rust (Android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "myHealth/src-tauri -> target"
          key: android-aarch64

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myHealth/package-lock.json

      - name: Install sharedCoreLib deps (prebuild builds the lib from these)
        working-directory: sharedCoreLib
        run: npm ci
      - name: Install scandoc-lib deps (prebuild also builds @scandoc/core)
        working-directory: sharedCoreLib/scandoc-lib
        run: npm ci

      - name: Install npm dependencies
        run: npm ci

      # libsodium.a for Android — built version-exact in a Linux container.
      # The image cross-compiles every ABI; `docker run` copies them into
      # src-tauri/vendor/libsodium/<target>/.
      - name: Cross-build libsodium.a (Docker)
        run: |
          docker build -t myhealth-libsodium-android:1.0.22 \
            -f scripts/android/Dockerfile.libsodium scripts/android
          mkdir -p src-tauri/vendor/libsodium
          docker run --rm -v "$PWD/src-tauri/vendor/libsodium:/out" \
            myhealth-libsodium-android:1.0.22
          ls -R src-tauri/vendor/libsodium

      # gen/android is gitignored, so regenerate the Gradle project each run.
      - name: Initialize the Android project
        run: npx tauri android init

      # SODIUM_LIB_DIR makes libsodium-sys-stable link our prebuilt .a instead of
      # autotools-building from source. It's a single dir, hence one ABI (arm64).
      - name: Build Android APK (debug) + AAB (release, unsigned)
        env:
          SODIUM_LIB_DIR: ${{ github.workspace }}/myHealth/src-tauri/vendor/libsodium/aarch64-linux-android
        run: |
          # Debug build → APK auto-signed with the Android debug key → installable.
          npx tauri android build --target aarch64 --debug --apk
          # Release AAB → unsigned; sign with a real upload key before Play upload.
          # TODO(signing): with an ANDROID_KEYSTORE secret, configure a release
          # signingConfig and build `--apk --aab` (no --debug) for production.
          npx tauri android build --target aarch64 --aab

      - name: Collect Android bundles
        shell: bash
        run: |
          DEST="$GITHUB_WORKSPACE/dist-bundles"
          mkdir -p "$DEST"
          find src-tauri/gen/android -path '*/outputs/*' \
            \( -name '*.apk' -o -name '*.aab' \) -exec cp {} "$DEST/" \;
          ls -la "$DEST"

      - name: Upload Android bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-android
          path: dist-bundles/*
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2c. iOS — UNSIGNED build (verifies the iOS target compiles).
  #     EXPERIMENTAL / unsigned: `continue-on-error`. Without an Apple Developer
  #     cert + provisioning profile, xcodebuild cannot produce a device IPA, so
  #     this job's value is "iOS compiles"; any archive/.app produced is uploaded
  #     best-effort.
  # ---------------------------------------------------------------------------
  build-ios:
    needs: version
    if: github.repository == 'tokans/myHealth'
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: myHealth
    steps:
      - name: Check out myHealth (this public repo)
        uses: actions/checkout@v4
        with:
          path: myHealth
      - name: Check out sharedCoreLib (public, file:../sharedCoreLib + scandoc-lib)
        uses: actions/checkout@v4
        with:
          repository: tokans/sharedCoreLib
          ref: master
          path: sharedCoreLib

      - name: Set up Rust (iOS target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "myHealth/src-tauri -> target"
          key: ios-aarch64

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myHealth/package-lock.json

      - name: Install sharedCoreLib deps (prebuild builds the lib from these)
        working-directory: sharedCoreLib
        run: npm ci
      - name: Install scandoc-lib deps (prebuild also builds @scandoc/core)
        working-directory: sharedCoreLib/scandoc-lib
        run: npm ci

      - name: Install npm dependencies
        run: npm ci

      # gen/apple is gitignored, so regenerate the Xcode project each run, then
      # inject the LAN-sync Info.plist keys the app needs.
      - name: Initialize the iOS project
        run: npx tauri ios init

      - name: Inject local-network sync plist keys
        run: npm run ios:plist

      # Patch the generated pbxproj to disable signing before tauri ios build
      # calls xcodebuild. sed for simple substitutions (BSD-safe); awk for the
      # multi-line injection (avoids the YAML heredoc indentation trap).
      - name: Disable code signing in generated Xcode project
        run: |
          P="src-tauri/gen/apple/myhealth.xcodeproj/project.pbxproj"
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$P"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$P"
          awk '/buildSettings = \{/ {
            print
            print "\t\t\t\tCODE_SIGN_IDENTITY = \"\";"
            print "\t\t\t\tCODE_SIGNING_REQUIRED = NO;"
            print "\t\t\t\tCODE_SIGNING_ALLOWED = NO;"
            next
          }
          { print }' "$P" > /tmp/pbxproj_patched && mv /tmp/pbxproj_patched "$P"
          echo "pbxproj patched"

      - name: Build iOS app (unsigned archive)
        run: npx tauri ios build --target aarch64 || true

      - name: Collect iOS bundles
        if: always()
        shell: bash
        run: |
          DEST="$GITHUB_WORKSPACE/dist-bundles"
          mkdir -p "$DEST"
          echo "=== xcarchive search ==="
          find /Users/runner /var/folders /tmp \
            -name '*.xcarchive' -maxdepth 10 2>/dev/null | head -20 || true
          ARCHIVE=$(find /Users/runner /var/folders /tmp \
            -name '*.xcarchive' -maxdepth 10 -print -quit 2>/dev/null || true)
          if [ -n "$ARCHIVE" ]; then
            echo "Collecting: $ARCHIVE"
            zip -qr "$DEST/myhealth-ios-unsigned.xcarchive.zip" "$ARCHIVE"
          else
            echo "No xcarchive found anywhere."
          fi
          ls -la "$DEST" || true

      - name: Upload iOS bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundles-ios
          path: dist-bundles/*
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Gather every platform's bundles and publish one release on this repo.
  # ---------------------------------------------------------------------------
  publish:
    needs: [version, build, sign-windows, build-android, build-ios]
    if: github.repository == 'tokans/myHealth'
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the Release + push README/gh-pages
    steps:
      - name: Check out source repo
        uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -R release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          if gh release view "$VERSION" --repo "$PUBLISH_REPO" > /dev/null 2>&1; then
            echo "Release $VERSION already exists — uploading/replacing assets."
            gh release upload "$VERSION" --repo "$PUBLISH_REPO" --clobber release-assets/*
          else
            gh release create "$VERSION" \
              --repo "$PUBLISH_REPO" \
              --title "myHealth $VERSION" \
              --generate-notes \
              release-assets/*
          fi

      # -----------------------------------------------------------------------
      # Refresh README.md on this repo with customer-facing product details plus
      # the notes for the release we just published.
      # -----------------------------------------------------------------------
      - name: Update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail

          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${PUBLISH_REPO}.git" \
            dest-repo
          cd dest-repo

          NOTES="$(gh release view "$VERSION" --repo "$PUBLISH_REPO" --json body --jq .body)"

          RELEASE_URL="https://github.com/${PUBLISH_REPO}/releases/tag/${VERSION}"
          SITE_URL="https://${PUBLISH_REPO%/*}.github.io/${PUBLISH_REPO#*/}/"
          {
            cat <<EOF
          # myHealth

          **Your family's health record, kept by you, on your device — never in
          anyone's cloud.** myHealth is a private, offline-first family health
          companion. There is no account, no server, and no tracking.

          🌐 **Website:** [${SITE_URL}](${SITE_URL})

          ## What it does

          - 👪 **Profiles for the whole family** — track vitals, goals and
            medications per person, all scoped to who you're looking at.
          - 📈 **Vitals & trends** — log weight, BP, glucose and more; see trends
            charted against healthy reference ranges.
          - 🎯 **Goals with a projected ETA** — set a target and get a realistic,
            deterministic estimate from your own readings.
          - ⏰ **Reminders** — water, daily tasks, medications and schedule blocks
            become gentle on-device reminders.
          - 🧾 **Medical documents** — store prescriptions, lab reports and
            insurance cards in an encrypted vault; scan & extract the key fields.
          - 🆘 **Emergency ICE card** — a grab-and-go medical card for emergencies.
          - 🔐 **Encrypted vault** — documents are protected by a master password
            (Argon2id + Stronghold) and AES-256-GCM. Nothing is stored in the clear.

          ## Download

          Browse screenshots, the demo, and what's new on the
          [project website](${SITE_URL}), or grab the installer for your platform
          from the [latest release](https://github.com/${PUBLISH_REPO}/releases/latest):

          | Platform | File |
          | --- | --- |
          | Windows | \`.msi\` / \`.exe\` installer |
          | macOS (Intel + Apple Silicon) | universal \`.dmg\` |
          | Android (arm64, experimental) | \`.apk\` (sideload) · \`.aab\` |
          | iOS (experimental) | unsigned build |

          All assets for this version are attached to the
          [${VERSION} release](${RELEASE_URL}).

          > Mobile builds are **experimental and unsigned** for now: the Android
          > \`.apk\` is debug-signed (sideloadable, not production) and iOS is not
          > yet code-signed.

          ## Privacy

          myHealth has **no backend and no telemetry**. All data lives in a local
          SQLite database and an encrypted vault on your own machine. The only
          network use is receive-only: pulling signed public reference content.

          ---

          ## Release notes — ${VERSION}

          EOF
            echo "$NOTES"
            cat <<'EOF'

          ---

          _This README is generated automatically on each release._
          EOF
          } > README.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README for ${VERSION}" || {
            echo "No README changes to commit."; exit 0;
          }
          git push

      # -----------------------------------------------------------------------
      # Publish the gh-pages landing site for this repo. Served at
      # https://tokans.github.io/myHealth/ once Pages is enabled (one-time:
      # Settings → Pages → Deploy from a branch → gh-pages / root). The current
      # release's notes are rendered on the page, so the site refreshes on every
      # release alongside the README.
      # -----------------------------------------------------------------------
      - name: Update GitHub Pages site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail

          RELEASE_URL="https://github.com/${PUBLISH_REPO}/releases/tag/${VERSION}"
          LATEST_URL="https://github.com/${PUBLISH_REPO}/releases/latest"
          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/${PUBLISH_REPO}.git"

          NOTES="$(gh release view "$VERSION" --repo "$PUBLISH_REPO" --json body --jq .body)"

          # Clone the existing gh-pages branch so manually-added assets survive;
          # create it the first time.
          if git clone --depth 1 --branch gh-pages "$AUTH_URL" site 2>/dev/null; then
            echo "Updating existing gh-pages branch."
          else
            echo "gh-pages branch not found; creating it."
            git clone --depth 1 "$AUTH_URL" site
            ( cd site && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true )
          fi
          cd site

          printf '%s\n' "$NOTES" > release-notes.md
          touch .nojekyll

          # Ship the tracked page assets (e.g. a demo video) from this repo into
          # the site, overwriting any prior copy.
          if [ -d "${GITHUB_WORKSPACE}/.github/pages/assets" ]; then
            mkdir -p assets
            cp -R "${GITHUB_WORKSPACE}/.github/pages/assets/." assets/
          fi

          # Render the landing page from the editable template in this repo.
          # URLs contain no '|', so it is a safe sed delimiter.
          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__REPO__|${PUBLISH_REPO}|g" \
            -e "s|__RELEASE_URL__|${RELEASE_URL}|g" \
            -e "s|__LATEST_URL__|${LATEST_URL}|g" \
            "${GITHUB_WORKSPACE}/.github/pages/index.template.html" > index.html

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "site: publish ${VERSION} landing page" || {
            echo "No site changes to commit."; exit 0;
          }
          git push origin HEAD:gh-pages
